name: Bug report
description: Report unexpected behavior, errors, or incorrect results
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and diagnose the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet to reproduce the behavior.
      placeholder: |
        1. Install koopman-graph ...
        2. Run ...
        3. See error ...
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (error message, wrong output, crash, etc.).
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KoopmanGraph version
      description: Output of `python -c "import koopman_graph; print(koopman_graph.__version__)"` or commit hash if installed from source.
      placeholder: e.g. 0.1.0 or abc1234
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
    validations:
      required: true

  - type: input
    id: torch
    attributes:
      label: PyTorch version
      placeholder: e.g. 2.8.0
    validations:
      required: true

  - type: input
    id: pyg
    attributes:
      label: PyTorch Geometric version
      placeholder: e.g. 2.6.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Dataset details, hardware (CPU/GPU), or anything else that may help.
      placeholder: Optional
