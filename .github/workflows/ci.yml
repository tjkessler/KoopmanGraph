name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/koopman_graph/**"
      - "scripts/**"
      - "tests/**"
      - "examples/**"
      - "docs/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
  # Always run on PRs so required status checks on main can be satisfied
  # for docs-only / config-only changes as well as code changes.
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra rl

      - name: Lint with Ruff
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=koopman_graph --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev --extra rl

      - name: Execute tutorial notebooks
        env:
          # Limit BLAS/OpenMP oversubscription when notebooks run in parallel.
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
        run: uv run pytest --nbmake examples/ -v -n 4 --durations=25

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra docs

      - name: Build Sphinx documentation
        run: uv run sphinx-build -b html -W --keep-going docs/source docs/build/html
