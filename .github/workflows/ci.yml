name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/koopman_graph/**"
      - "scripts/**"
      - "tests/**"
      - "examples/**"
      - "docs/**"
      - ".github/workflows/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "src/koopman_graph/**"
      - "scripts/**"
      - "tests/**"
      - "examples/**"
      - "docs/**"
      - ".github/workflows/**"
      - "pyproject.toml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,rl]"

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run tests
        run: pytest tests/ -v --cov=koopman_graph --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,rl]"

      - name: Execute tutorial notebooks
        env:
          # Limit BLAS/OpenMP oversubscription when notebooks run in parallel.
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
        run: pytest --nbmake examples/ -v -n 2

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"

      - name: Build Sphinx documentation
        run: sphinx-build -b html -W --keep-going docs/source docs/build/html
