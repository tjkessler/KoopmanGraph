name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/koopman_graph/**"
      - "scripts/**"
      - "tests/**"
      - "examples/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      test: ${{ steps.filter.outputs.test }}
      notebooks: ${{ steps.filter.outputs.notebooks }}
      docs: ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 <<'PY'
          import os
          import subprocess
          from pathlib import PurePosixPath

          event = os.environ["EVENT_NAME"]
          head = os.environ["HEAD_SHA"]
          before = os.environ.get("BEFORE_SHA", "")
          base = os.environ.get("BASE_SHA", "")

          if event == "pull_request":
              range_spec = f"{base}...{head}"
              files = subprocess.check_output(
                  ["git", "diff", "--name-only", range_spec], text=True
              ).splitlines()
          elif before and before != "0" * 40:
              files = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{before}...{head}"], text=True
              ).splitlines()
          else:
              files = subprocess.check_output(
                  ["git", "show", "--name-only", "--pretty=", head], text=True
              ).splitlines()

          files = [f for f in files if f]

          def hit(*prefixes_or_names: str) -> bool:
              for path in files:
                  posix = PurePosixPath(path)
                  for spec in prefixes_or_names:
                      if spec.endswith("/"):
                          if path == spec[:-1] or path.startswith(spec):
                              return True
                      elif "/" not in spec:
                          if posix.name == spec or path == spec:
                              return True
                      else:
                          if path == spec or path.startswith(spec + "/"):
                              return True
              return False

          def emit(name: str, value: bool) -> None:
              text = "true" if value else "false"
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
                  fh.write(f"{name}={text}\n")
              print(f"{name}={text}")

          lint = hit("src/", "tests/", "pyproject.toml", ".pre-commit-config.yaml")
          test = hit("src/", "tests/", "scripts/", "pyproject.toml", "uv.lock")
          notebooks = hit("examples/", "src/", "pyproject.toml", "uv.lock")
          docs = hit("docs/", "README.md", "src/", "pyproject.toml")
          workflow = hit(".github/workflows/ci.yml")

          emit("lint", lint)
          emit("test", test)
          emit("notebooks", notebooks)
          emit("docs", docs)
          emit("workflow", workflow)
          PY

  lint:
    needs: changes
    if: needs.changes.outputs.lint == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Lint with Ruff
        run: |
          uvx ruff check src/ tests/
          uvx ruff format --check src/ tests/

  test:
    name: test (${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.test == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            coverage: "false"
          - python-version: "3.12"
            coverage: "true"

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra rl

      - name: Run tests
        if: matrix.coverage != 'true'
        env:
          # Avoid BLAS/PyTorch oversubscription under pytest-xdist.
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          TORCH_NUM_THREADS: "1"
        run: uv run --no-sync pytest tests/ -n auto

      - name: Run tests with coverage
        if: matrix.coverage == 'true'
        env:
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          TORCH_NUM_THREADS: "1"
        run: >
          uv run --no-sync pytest tests/ -n auto
          --cov=koopman_graph
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90

      - name: Upload coverage reports to Codecov
        if: matrix.coverage == 'true'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  notebooks:
    name: notebooks (${{ matrix.shard }})
    needs: changes
    if: needs.changes.outputs.notebooks == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: "01-13"
            pattern: "examples/0[1-9]_*.ipynb examples/1[0-3]_*.ipynb"
          - shard: "14-26"
            pattern: "examples/1[4-9]_*.ipynb examples/2[0-6]_*.ipynb"
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra rl

      - name: Execute tutorial notebooks
        env:
          # Limit BLAS/OpenMP/PyTorch oversubscription when notebooks run in parallel.
          OMP_NUM_THREADS: "1"
          MKL_NUM_THREADS: "1"
          OPENBLAS_NUM_THREADS: "1"
          TORCH_NUM_THREADS: "1"
        run: uv run --no-sync pytest --nbmake ${{ matrix.pattern }} -n 4 --durations=25

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --extra docs

      - name: Build Sphinx documentation
        run: uv run --no-sync sphinx-build -b html -W --keep-going docs/source docs/build/html

  # Single required check for branch protection. Individual jobs may be skipped
  # by path filters; this aggregator still reports success when skips are expected.
  ci:
    name: ci
    needs: [changes, lint, test, notebooks, docs]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          if needs["changes"]["result"] != "success":
              sys.exit("changes job did not succeed")
          for job in ("lint", "test", "notebooks", "docs"):
              result = needs[job]["result"]
              if result not in ("success", "skipped"):
                  sys.exit(f"{job} failed with result={result}")
          print("CI OK")
          PY
