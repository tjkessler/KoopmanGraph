name: Draft JOSS paper

# Compiles paper.md + paper.bib into a JOSS-styled PDF on every change so the
# manuscript stays submission-ready. This does NOT submit anything to JOSS; it
# only validates that the paper builds and uploads the PDF as a CI artifact.

on:
  push:
    branches:
      - main
    paths:
      - "paper.md"
      - "paper.bib"
      - ".github/workflows/draft-pdf.yml"
  pull_request:
    branches:
      - main
    paths:
      - "paper.md"
      - "paper.bib"
      - ".github/workflows/draft-pdf.yml"
  workflow_dispatch:

jobs:
  paper:
    runs-on: ubuntu-latest
    name: Compile paper draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build draft PDF
        # Pin to commit on master (2024-07-17) for supply-chain safety.
        uses: openjournals/openjournals-draft-action@85a18372e48f551d8af9ddb7a747de685fbbb01c
        with:
          journal: joss
          paper-path: paper.md

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf
